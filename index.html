<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idioma Independente</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f8; min-height: 100vh; }
.tabs { display: flex; background: #1a3a7a; }
.tab-btn { flex: 1; padding: 14px; color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 600; border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
.tab-btn.active { color: #fff; border-bottom-color: #cc2222; }
.tab-content { display: none; padding: 1.5rem 1rem; max-width: 540px; margin: 0 auto; }
.tab-content.active { display: block; }
.logo { text-align: center; margin-bottom: 1.5rem; }
.logo h1 { font-size: 1.4rem; font-weight: 700; color: #1a3a7a; }
.logo span { color: #cc2222; }
.logo p { font-size: 0.75rem; color: #5a6a8a; margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }
.card { background: #fff; border-radius: 14px; box-shadow: 0 4px 20px rgba(26,58,122,0.09); padding: 1.5rem; margin-bottom: 1.25rem; }
.section-title { font-size: 0.68rem; font-weight: 700; color: #1a3a7a; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 0.75rem; }
.toggle-group { display: flex; gap: 7px; flex-wrap: wrap; }
.toggle-btn { flex: 1; min-width: 75px; padding: 9px 6px; border: 1.5px solid #d0d8e8; border-radius: 9px; background: #f5f8ff; color: #5a6a8a; font-size: 0.78rem; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.18s; line-height: 1.3; }
.toggle-btn.active { background: #1a3a7a; color: #fff; border-color: #1a3a7a; }
.toggle-btn.active.red { background: #cc2222; border-color: #cc2222; }
.toggle-btn small { display: block; font-weight: 400; font-size: 0.68rem; opacity: 0.8; margin-top: 2px; }
.divider { border: none; border-top: 1px solid #eef2f8; margin: 1.25rem 0; }
.result-box { background: #1a3a7a; border-radius: 13px; padding: 1.25rem; color: #fff; }
.result-plans { display: grid; gap: 8px; }
.plan-row { background: rgba(255,255,255,0.1); border-radius: 9px; padding: 10px 13px; }
.plan-row.best { background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.3); }
.plan-row.warn { background: rgba(204,34,34,0.15); border: 1px solid rgba(204,34,34,0.3); }
.plan-title { font-size: 0.73rem; font-weight: 700; opacity: 0.85; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
.plan-line { font-size: 0.8rem; opacity: 0.9; padding: 1px 0; }
.plan-line s { opacity: 0.5; font-size: 0.72rem; margin-left: 4px; }
.best-badge { display: inline-block; background: #cc2222; color: #fff; font-size: 0.62rem; font-weight: 700; padding: 1px 6px; border-radius: 20px; margin-left: 5px; vertical-align: middle; }
.warn-badge { display: inline-block; background: rgba(204,34,34,0.8); color: #fff; font-size: 0.62rem; font-weight: 700; padding: 1px 6px; border-radius: 20px; margin-left: 5px; vertical-align: middle; }
.warn-text { font-size: 0.72rem; opacity: 0.85; margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.15); font-style: italic; }
.msg-preview { background: #f5f8ff; border-radius: 9px; padding: 1rem; font-size: 0.8rem; color: #1a3a7a; white-space: pre-wrap; line-height: 1.65; border: 1.5px solid #d0d8e8; min-height: 60px; }
.copy-btn { margin-top: 0.75rem; width: 100%; padding: 11px; background: #25D366; color: #fff; border: none; border-radius: 9px; font-size: 0.9rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; }
.copy-btn:hover { opacity: 0.88; }
.copied { text-align: center; font-size: 0.78rem; color: #25D366; font-weight: 600; margin-top: 6px; opacity: 0; transition: opacity 0.3s; }
/* ADMIN */
.admin-wrap { max-width: 100%; overflow-x: auto; }
table { border-collapse: collapse; width: 100%; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(26,58,122,0.08); margin-bottom: 1.5rem; font-size: 12px; }
th { background: #1a3a7a; color: #fff; padding: 9px 10px; text-align: center; font-size: 11px; font-weight: 600; }
th.left { text-align: left; }
td { padding: 6px 9px; border-bottom: 1px solid #eef2f8; text-align: center; color: #1a3a7a; vertical-align: middle; }
td.lbl { text-align: left; font-weight: 600; background: #f5f8ff; white-space: pre-line; }
td.sub { text-align: left; color: #5a6a8a; background: #f9fbff; padding-left: 14px; font-size: 11px; }
td input.val { width: 64px; padding: 3px 5px; border: 1.5px solid #d0d8e8; border-radius: 5px; font-size: 11px; color: #1a3a7a; text-align: center; background: #fff; display: block; margin: 0 auto 2px; }
td input.val:focus { border-color: #1a3a7a; outline: none; }
td input.val.mirrored { background: #f0f4ff; color: #7a8abf; border-color: #b0bcdf; }
td .al { font-size: 9px; color: #9aaac8; display: block; }
td.risc { color: #999; font-size: 10px; }
tr.gh td { background: #1a3a7a; color: #fff; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; user-select: none; padding: 9px 13px; }
tr.gh td:hover { background: #15306a; }
tr.collapsed { display: none; }
.save-btn { padding: 10px 22px; background: #1a3a7a; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 1rem; }
.save-btn:hover { opacity: 0.88; }
.save-ok { font-size: 12px; color: #25D366; font-weight: 600; margin-left: 10px; opacity: 0; transition: opacity 0.3s; }
.promo-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(26,58,122,0.08); padding: 1.25rem; margin-bottom: 1rem; }
.promo-card h3 { font-size: 12px; font-weight: 700; color: #1a3a7a; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
.promo-row { display: grid; grid-template-columns: 80px 1fr; gap: 8px; align-items: start; margin-bottom: 8px; }
.promo-row label { font-size: 11px; font-weight: 600; color: #5a6a8a; padding-top: 6px; }
.promo-row textarea { width: 100%; padding: 6px 9px; border: 1.5px solid #d0d8e8; border-radius: 7px; font-size: 11px; color: #1a3a7a; resize: vertical; min-height: 48px; font-family: inherit; }
.promo-row textarea:focus { border-color: #1a3a7a; outline: none; }
</style>
</head>

// ── ROUNDING ─────────────────────────────────────────────
function smartRound(val) {
  if (val <= 0) return 0;
  const r = Math.round(val);
  const d = r % 10;
  if (d <= 3) return r - d - 3;
  if (d <= 7) return r - d + 7;
  return r - d + 7;
}
function fmtBRL(v) { return 'R$ ' + v.toLocaleString('pt-BR'); }

// ── STATE ─────────────────────────────────────────────────
let sel = { ii:0, pi:0, mt:1, pkg:'main', fq:'12', cupom:'indicacao' };

function setupToggle(groupId, key, parse) {
  document.querySelectorAll(`#${groupId} .toggle-btn`).forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll(`#${groupId} .toggle-btn`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const raw = btn.dataset[key === 'ii' ? 'ii' : key === 'pi' ? 'pi' : key === 'mt' ? 'mt' : key === 'pkg' ? 'pkg' : key === 'cupom' ? 'cupom' : 'fq'];
      sel[key] = parse ? parse(raw) : raw;
      if (key === 'ii') updateTipoBtns();
      if (key === 'cupom') {
        document.getElementById('cupom-input-wrap').style.display = raw === 'influencer' ? 'block' : 'none';
      }
      renderEscolhedor();
    });
  });
}
document.getElementById('cupom-input').addEventListener('input', renderEscolhedor);
setupToggle('idioma-group','ii', v => parseInt(v));
setupToggle('tipo-group','pi', v => parseInt(v));
setupToggle('turma-group','mt', v => parseFloat(v));
setupToggle('pacotes-group','pkg', v => v);
setupToggle('freq-group','fq', v => v);
setupToggle('cupom-group','cupom', v => v);

function updateTipoBtns() {
  const profBtn = document.getElementById('btn-prof');
  if (sel.ii !== 0) {
    profBtn.innerHTML = 'Avançado<small>Especialização</small>';
    profBtn.classList.remove('red');
  } else {
    profBtn.innerHTML = 'Prova de<small>Proficiência</small>';
    profBtn.classList.add('red');
  }
}

function applyTurma(base, mt) {
  if (mt === 1) return base;
  return smartRound(base * mt);
}

function getFreqsToShow() {
  return sel.fq === '12' ? [0,1] : [0,1,2];
}

function renderEscolhedor() {
  const { ii, pi, mt, pkg } = sel;
  const container = document.getElementById('result-plans');
  container.innerHTML = '';
  const freqs = getFreqsToShow();
  const plans = pkg === 'main' ? PLAN_META.filter(p => !p.warn) : PLAN_META;

  plans.forEach(plan => {
    let lines = [];
    freqs.forEach(fi => {
      const base = getPrice(ii, pi, fi, plan.di);
      if (!base) return;
      const real = applyTurma(base, mt);
      const risc = Math.round(real * 1.3);
      const aulas = AULAS_PACOTE[fi][plan.di];
      lines.push(`${fi+1}x na semana (${aulas} aulas) — ${plan.parc}x de ${fmtBRL(real)} ~${fmtBRL(risc)}~`);
    });
    if (!lines.length) return;

    const div = document.createElement('div');
    div.className = 'plan-row' + (plan.best ? ' best' : '') + (plan.warn ? ' warn' : '');
    let badge = plan.best ? '<span class="best-badge">⭐ Melhor pacote</span>' : '';
    let warnBadge = plan.warn ? '<span class="warn-badge">⚠️ Só avançados</span>' : '';
    let warnText = plan.warn ? `<div class="warn-text">⚠️ PACOTES RECOMENDADOS SOMENTE PARA ALUNOS AVANÇADOS. Confirme com seu mentor antes de enviar.</div>` : '';
    div.innerHTML = `<div class="plan-title">${plan.label} — ${plan.sublabel}${badge}${warnBadge}</div>`
      + lines.map(l => `<div class="plan-line">${l}</div>`).join('')
      + warnText;
    container.appendChild(div);
  });

  renderMsg();
}

// ── MENSAGEM ──────────────────────────────────────────────
function renderMsg() {
  const { ii, pi, mt, pkg } = sel;
  const freqs = getFreqsToShow();
  const now = new Date();
  const mes = now.getMonth(); // 0-indexed
  const promo = PROMO_DATA[mes];
  const idiomaLabel = IDIOMAS[ii].label;
  const pacoteLabel = IDIOMAS[ii].pacotes[pi]?.label.replace(/\n/g,' ') || '';
  const turmaLabel  = TURMAS.find(t => t.mt === mt)?.label || 'Particular';
  const plans = pkg === 'main' ? PLAN_META.filter(p => !p.warn) : PLAN_META.filter(p => p.warn);

  let msg = '';
  if (pkg === 'main') {
    msg += `${promo.titulo}\n\n`;
  }
  msg += `*Curso de ${idiomaLabel}*`;
  if (pi > 0) msg += ` — _${pacoteLabel}_`;
  if (mt < 1) msg += ` — _Turma: ${turmaLabel}_`;
  msg += '\n\n';
  msg += `🗒️ *Pague em até 15 dias após o início*, sem custo de matrícula, via *boleto* 😌\n`;

  const cupomVal = sel.cupom === 'influencer'
    ? (document.getElementById('cupom-input').value.trim() || 'INFLUENCER')
    : 'INDICAÇÃO';
  msg += `🎟️ Cupom *${cupomVal}* aplicado\n\n`;

  plans.forEach(plan => {
    let lines = [];
    freqs.forEach(fi => {
      const base = getPrice(ii, pi, fi, plan.di);
      if (!base) return;
      const real = applyTurma(base, mt);
      const risc = Math.round(real * 1.3);
      const aulas = AULAS_PACOTE[fi][plan.di];
      lines.push(`- ${fi+1}x na semana (${aulas} aulas) - de ~${fmtBRL(risc)}~ por ${fmtBRL(real)}/mês${plan.best && fi===1 ? ' - *Pacote Sugerido*' : ''}`);
    });
    if (!lines.length) return;
    msg += `* *${plan.label} de Curso* (${plan.sublabel}) - ${plan.parc} mensalidades${plan.best ? ' - *MELHOR PACOTE*' : ''}\n`;
    msg += lines.join('\n') + '\n\n';
  });

  msg += `🏠 Aula *${turmaLabel.toLowerCase()}* com Material Personalizado em Plataforma Exclusiva\n`;
  msg += `🆓 *GRÁTIS - Taxa de matrícula e de material = R$ 0,00*`;
  if (pkg === 'main') {
    msg += `\n\n${promo.bonus}`;
  }

  document.getElementById('msg-preview').textContent = msg;
}

function copyMsg() {
  navigator.clipboard.writeText(document.getElementById('msg-preview').textContent).then(() => {
    const el = document.getElementById('copied-msg');
    el.style.opacity = '1';
    setTimeout(() => el.style.opacity = '0', 2500);
  });
}

// ── ADMIN: PROMO FIELDS ───────────────────────────────────
function buildPromoFields() {
  const container = document.getElementById('promo-fields');
  MESES.forEach((mes, i) => {
    const row = document.createElement('div');
    row.style.marginBottom = '1rem';
    row.innerHTML = `<div style="font-size:11px;font-weight:700;color:#1a3a7a;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px">${mes}</div>`;

    const r1 = document.createElement('div');
    r1.className = 'promo-row';
    r1.innerHTML = `<label>Título promo</label>`;
    const ta1 = document.createElement('textarea');
    ta1.id = `promo-titulo-${i}`; ta1.value = PROMO_DATA[i].titulo;
    r1.appendChild(ta1); row.appendChild(r1);

    const r2 = document.createElement('div');
    r2.className = 'promo-row';
    r2.innerHTML = `<label>Bônus</label>`;
    const ta2 = document.createElement('textarea');
    ta2.id = `promo-bonus-${i}`; ta2.value = PROMO_DATA[i].bonus;
    r2.appendChild(ta2); row.appendChild(r2);

    container.appendChild(row);
  });
}

// ── ADMIN: TABELA ─────────────────────────────────────────
function isMirrorTarget(ii, pi) { return MIRRORS.some(m => m.to[0]===ii && m.to[1]===pi); }

function buildAdmin() {
  const tbody = document.getElementById('admin-tbody');
  tbody.innerHTML = '';
  IDIOMAS.forEach((idioma, ii) => {
    const hrow = document.createElement('tr'); hrow.className = 'gh';
    const htd = document.createElement('td');
    htd.colSpan = 2 + DURACOES.length * 2;
    htd.textContent = '▾ ' + idioma.label;
    htd.addEventListener('click', () => {
      const open = htd.textContent.startsWith('▾');
      htd.textContent = (open?'▸ ':'▾ ') + idioma.label;
      tbody.querySelectorAll(`.gr-${ii}`).forEach(r => r.classList.toggle('collapsed', open));
    });
    hrow.appendChild(htd); tbody.appendChild(hrow);

    idioma.pacotes.forEach((pacote, pi) => {
      FREQS.forEach((freq, fi) => {
        const row = document.createElement('tr'); row.className = `gr-${ii}`;
        if (fi === 0) {
          const ltd = document.createElement('td');
          ltd.className = 'lbl'; ltd.rowSpan = FREQS.length;
          ltd.textContent = pacote.label; row.appendChild(ltd);
        }
        const ftd = document.createElement('td');
        ftd.className = 'sub'; ftd.textContent = freq+'x'; row.appendChild(ftd);

        DURACOES.forEach((_, di) => {
          const key = `${ii}-${pi}-${fi}-${di}`;
          const pre = PRICES[key]||0;
          const mirror = isMirrorTarget(ii,pi);
          const realTd = document.createElement('td');
          const inp = document.createElement('input');
          inp.type='number'; inp.placeholder='0'; inp.id='adm-'+key;
          inp.className='val'+(mirror?' mirrored':'');
          if (pre) inp.value=pre;
          inp.addEventListener('input', () => {
            const v=parseFloat(inp.value)||0;
            document.getElementById('ar-'+key).textContent = v?'R$'+Math.round(v*1.3):'—';
            MIRRORS.forEach(m => {
              if (m.from[0]===ii&&m.from[1]===pi) {
                const tk=`${m.to[0]}-${m.to[1]}-${fi}-${di}`;
                const ti=document.getElementById('adm-'+tk);
                if(ti){ti.value=inp.value; document.getElementById('ar-'+tk).textContent=v?'R$'+Math.round(v*1.3):'—';}
              }
            });
          });
          const al=document.createElement('span'); al.className='al'; al.textContent=AULAS_PACOTE[fi][di]+' aulas';
          realTd.appendChild(inp); realTd.appendChild(al); row.appendChild(realTd);
          const rTd=document.createElement('td'); rTd.className='risc'; rTd.id='ar-'+key;
          rTd.textContent=pre?'R$'+Math.round(pre*1.3):'—'; row.appendChild(rTd);
        });
        tbody.appendChild(row);
      });
    });
  });
  // mirrors on load
  MIRRORS.forEach(m => {
    FREQS.forEach((_,fi) => { DURACOES.forEach((_,di) => {
      const fk=`${m.from[0]}-${m.from[1]}-${fi}-${di}`, tk=`${m.to[0]}-${m.to[1]}-${fi}-${di}`;
      const fi2=document.getElementById('adm-'+fk), ti=document.getElementById('adm-'+tk);
      if(fi2&&ti&&fi2.value&&!ti.value){ti.value=fi2.value; const v=parseFloat(fi2.value)||0; document.getElementById('ar-'+tk).textContent=v?'R$'+Math.round(v*1.3):'—';}
    });});
  });
}

function saveAdmin() {
  IDIOMAS.forEach((_,ii) => { _.pacotes.forEach((_,pi) => { FREQS.forEach((_,fi) => { DURACOES.forEach((_,di) => {
    const key=`${ii}-${pi}-${fi}-${di}`;
    const inp=document.getElementById('adm-'+key);
    if(inp) PRICES[key]=parseFloat(inp.value)||0;
  });});});});
  MESES.forEach((_,i) => {
    const t=document.getElementById(`promo-titulo-${i}`);
    const b=document.getElementById(`promo-bonus-${i}`);
    if(t) PROMO_DATA[i].titulo=t.value;
    if(b) PROMO_DATA[i].bonus=b.value;
  });
  renderEscolhedor();
  const ok=document.getElementById('save-ok');
  ok.style.opacity='1'; setTimeout(()=>ok.style.opacity='0',2500);
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
}

buildPromoFields();
buildAdmin();
renderEscolhedor();
</script>
</body>
</html>
